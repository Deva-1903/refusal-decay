# SMOKE-TEST / DEBUG OVERRIDE: Llama-3.2-3B-Instruct
#
# Use this config when you want to validate the pipeline quickly
# before running full experiments on the 8B research target.
#
# Usage (any script):
#   python scripts/run_baseline.py --model-config configs/model_3b.yaml
#
# Do NOT use this for final course project results — use 8B (the default).

model:
  name: meta-llama/Llama-3.2-3B-Instruct
  dtype: bfloat16
  device_map: auto

probing:
  # 3B has 28 layers (indices 0–27)
  layers: [0, 4, 8, 12, 16, 20, 24, 27]
