# RESEARCH TARGET: Llama-3.1-8B-Instruct
#
# This is the primary model for all course project experiments.
# It is also the default in configs/base.yaml.
# This file exists as an explicit reference and for documentation.
#
# Requirements: ~20GB VRAM (A100-40GB or equivalent recommended).

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  device_map: auto

probing:
  # 8B has 32 layers (indices 0–31)
  layers: [0, 4, 8, 12, 16, 20, 24, 28, 31]
