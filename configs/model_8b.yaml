# Explicit 8B model override.
#
# Use this config when you want to pin the repo to the 8B research target
# explicitly instead of relying on the base config default.
#
# Usage (any script):
#   python scripts/run_baseline.py --model-config configs/model_8b.yaml
#
# This matches the project's primary model.

model:
  name: meta-llama/Llama-3.1-8B-Instruct
  dtype: bfloat16
  device_map: auto

probing:
  # 8B has 32 layers (indices 0–31)
  layers: [0, 4, 8, 12, 16, 20, 24, 28, 31]
