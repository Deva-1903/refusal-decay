# Pilot patching experiment:
# copy refusal-direction component from early token position into later positions.

patching:
  source_position: 0        # take direction component from token 0 of generation
  target_positions: [5, 10, 15]
  layers: [8, 16, 24]
  mode: replace
  output_dir: outputs/patches/

data:
  # Use a small subset for the pilot
  max_prompts: 20
